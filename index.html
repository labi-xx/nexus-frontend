<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14; --surface: #13161d; --surface2: #1a1e28;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
    --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12); --accent-glow: rgba(79,142,247,0.25);
    --green: #34d399; --red: #f87171; --amber: #fbbf24;
    --text-primary: #e8eaf0; --text-secondary: #6b7280; --text-muted: #3d4452;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .page { display: flex; min-height: 100vh; }
  .page.hidden { display: none !important; }

  /* Topbar */
  .topbar { position: fixed; top: 0; left: 0; right: 0; height: 52px; background: rgba(12,15,20,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; z-index: 100; }
  .topbar-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-user { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-secondary); }
  .role-badge { padding: 2px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .role-badge.admin { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.25); }
  .role-badge.user  { background: rgba(79,142,247,0.12);  color: #6ba3ff;    border: 1px solid rgba(79,142,247,0.2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; padding: 5px 14px; border-radius: var(--radius); cursor: pointer; }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--surface); }

  /* Login */
  #login-page { align-items: center; justify-content: center; flex-direction: column; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,142,247,0.08) 0%, transparent 60%); }
  .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo-mark { width: 44px; height: 44px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border-hover); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 20px; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.4); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); padding: 10px 14px; outline: none; }
  .field input:focus { border-color: rgba(79,142,247,0.5); box-shadow: 0 0 0 3px var(--accent-dim); }
  .btn-primary { width: 100%; padding: 10px 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: #6ba3ff; box-shadow: 0 4px 20px var(--accent-glow); }
  .login-tabs { display: flex; gap: 0; margin-bottom: 22px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .login-tab { flex: 1; padding: 8px; background: transparent; border: none; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; }
  .login-tab.active { background: var(--surface2); color: var(--text-primary); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .api-error { display: none; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: 6px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px; }
  .api-error.show { display: block; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Dashboard */
  #dashboard-page, #detail-page { flex-direction: column; padding-top: 52px; }
  .dash-content { max-width: 980px; margin: 0 auto; padding: 48px 24px 60px; width: 100%; }
  .dash-title { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .dash-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 34px;}
  .modules-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .module-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s; }
  .module-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .card-icon-wrap { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 17px; background: var(--surface2); border: 1px solid var(--border); }
  .card-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
  .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .card-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  
  /* Detail Page & Lists */
  .detail-content { max-width: 820px; margin: 0 auto; padding: 44px 24px 60px; width: 100%; }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .btn-add { padding: 8px 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-add:hover { background: #6ba3ff; box-shadow: 0 4px 16px var(--accent-glow); }
  .list-group { display: flex; flex-direction: column; gap: 6px; }
  .list-item { display: flex; align-items: center; gap: 14px; padding: 13px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .list-item:hover { border-color: var(--border-hover); background: var(--surface2); }
  .list-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .list-info { flex: 1; }
  .list-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .list-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .item-actions { display: flex; gap: 6px; }
  .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-secondary); cursor: pointer; }
  .btn-icon:hover { color: var(--text-primary); border-color: var(--border-hover); }

  /* Modals */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(6,8,12,0.75); backdrop-filter: blur(6px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border-hover); border-radius: 12px; width: 100%; max-width: 460px; padding: 28px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
  .form-field { margin-bottom: 14px; }
  .form-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .form-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); padding: 8px 12px; outline: none; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-modal-primary { flex: 1; padding: 9px 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; cursor: pointer; }
  .btn-modal-secondary { padding: 9px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-secondary); cursor: pointer; }

  /* View Modal (For normal users) */
  #vm-icon { font-size: 24px; margin-bottom: 12px; }
  #vm-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  #vm-meta { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  #vm-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; padding: 12px; background: var(--surface2); border-radius: 6px; margin-bottom: 20px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border-hover); border-radius: 10px; padding: 12px 16px; box-shadow: 0 16px 40px rgba(0,0,0,0.4); transform: translateY(20px); opacity: 0; transition: all 0.3s; z-index: 300; display: flex; gap: 10px; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="page" id="login-page">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-mark">⬡</div><div class="login-logo-name">Nexus</div>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('login')">Sign in</button>
        <button class="login-tab" onclick="switchTab('register')">Register</button>
      </div>
      <div class="api-error" id="api-error-login"></div>
      <div class="api-error" id="api-error-register"></div>
      
      <div class="tab-panel active" id="tab-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="admin@nexus.ai"></div>
        <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
      </div>

      <div class="tab-panel" id="tab-register">
        <div class="field"><label>Name</label><input type="text" id="reg-name" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="user@nexus.ai"></div>
        <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="Min. 6 chars"></div>
        <button class="btn-primary" id="register-btn" onclick="doRegister()">Create account</button>
      </div>
    </div>
  </div>
</div>

<div class="page hidden" id="dashboard-page">
  <nav class="topbar">
    <div class="topbar-logo"><div class="logo-dot"></div>Nexus</div>
    <div class="topbar-right">
      <span class="topbar-user" id="nav-user">—</span>
      <span class="role-badge" id="nav-role-badge">—</span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div class="dash-content">
    <div class="dash-title">Welcome, <span id="dash-name">there</span>.</div>
    <div class="dash-desc">Select a module below to get started.</div>
    <div class="modules-grid" id="modules-grid"></div>
  </div>
</div>

<div class="page hidden" id="detail-page">
  <nav class="topbar">
    <div class="topbar-logo"><div class="logo-dot"></div>Nexus</div>
    <div class="topbar-right"><button class="btn-ghost" onclick="goBack()">← Back</button></div>
  </nav>
  <div class="detail-content">
    <div class="detail-head">
      <div>
        <h2 id="detail-title">Module</h2>
        <p id="detail-subtitle" style="color:var(--text-secondary);font-size:13px;"></p>
      </div>
      <button class="btn-add hidden" id="add-item-btn" onclick="openAddModal()">+ Add Item</button>
    </div>
    <div class="list-group" id="list-group"></div>
  </div>
</div>

<div class="overlay" id="edit-overlay" onclick="closeOverlay('edit-overlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom: 20px;" id="edit-modal-title">Add Item</h3>
    <div class="form-field"><label>Icon (emoji)</label><input type="text" id="ef-icon" placeholder="🚀"></div>
    <div class="form-field"><label>Name</label><input type="text" id="ef-name" placeholder="Item Name"></div>
    <div class="form-field"><label>Description / Meta</label><input type="text" id="ef-meta" placeholder="Details..."></div>
    <div class="form-field"><label>Download URL / Link (Optional)</label><input type="url" id="ef-url" placeholder="https://drive.google.com/..."></div>
    
    <div class="modal-actions">
      <button class="btn-modal-primary" id="edit-confirm-btn" onclick="saveItem()">Save</button>
      <button class="btn-modal-secondary" onclick="closeOverlay('edit-overlay')">Cancel</button>
    </div>
  </div>
</div>

<div class="overlay" id="view-overlay" onclick="closeOverlay('view-overlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="vm-icon">📌</div>
    <div id="vm-title">Item Name</div>
    <div id="vm-meta">Meta data</div>
    <div id="vm-desc">No description available.</div>
    <div class="modal-actions">
      <button class="btn-modal-primary" id="vm-cta">Download Link</button>
      <button class="btn-modal-secondary" onclick="closeOverlay('view-overlay')">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div id="toast-icon">✓</div>
  <div>
    <div style="font-size: 13px; font-weight: 600;" id="toast-title">—</div>
    <div style="font-size: 12px; color: var(--text-secondary);" id="toast-msg">—</div>
  </div>
</div>

<script>
const API_BASE = 'https://nexus-api-server-ref0.onrender.com/api';

const MODULES = [
  { id:'downloads', icon:'↓', name:'App Downloads', desc:'Client apps, tools, and packages.', ctaLabel:'Download Now' },
  { id:'tutorials', icon:'▶', name:'Tutorials',     desc:'Step-by-step guides and training.', ctaLabel:'Open Link' },
  { id:'docs',      icon:'📄', name:'Documentation', desc:'Technical specs and architecture.', ctaLabel:'View Doc' },
];

let currentUser = null, currentMod = null, allItems = [], editingId = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(API_BASE + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.success === false) throw new Error(data.message || 'Server error');
  return data;
}

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((el, i) => el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.querySelectorAll('.api-error').forEach(e => e.classList.remove('show'));
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  try {
    await api('POST', '/login', { email, password: pass });
    const role = email.includes('admin') ? 'admin' : 'user';
    currentUser = { name: email.split('@')[0].toUpperCase(), email, role };
    sessionStorage.setItem('nexus_user', JSON.stringify(currentUser));
    enterApp();
  } catch (err) { alert(err.message); }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const name  = document.getElementById('reg-name').value;
  try {
    await api('POST', '/register', { email, password: pass });
    currentUser = { name: name.toUpperCase(), email, role: 'user' };
    sessionStorage.setItem('nexus_user', JSON.stringify(currentUser));
    enterApp();
  } catch (err) { alert(err.message); }
}

function enterApp() {
  document.getElementById('nav-user').textContent = currentUser.email;
  document.getElementById('nav-role-badge').textContent = currentUser.role === 'admin' ? '⚡ ADMIN' : '👤 OP';
  document.getElementById('nav-role-badge').className = 'role-badge ' + currentUser.role;
  document.getElementById('dash-name').textContent = currentUser.name;
  buildDashboard();
  showPage('dashboard-page');
}

function buildDashboard() {
  const grid = document.getElementById('modules-grid'); grid.innerHTML = '';
  MODULES.forEach(mod => {
    const card = document.createElement('div'); card.className = 'module-card';
    card.innerHTML = `<div class="card-icon-wrap">${mod.icon}</div><div class="card-name">${mod.name}</div><div class="card-desc">${mod.desc}</div>`;
    card.onclick = () => openModule(mod.id);
    grid.appendChild(card);
  });
}

async function openModule(id) {
  currentMod = id; const mod = MODULES.find(m => m.id === id);
  document.getElementById('detail-title').textContent = mod.name;
  document.getElementById('detail-subtitle').textContent = mod.desc;
  const addBtn = document.getElementById('add-item-btn');
  currentUser.role === 'admin' ? addBtn.classList.remove('hidden') : addBtn.classList.add('hidden');
  showPage('detail-page');
  document.getElementById('list-group').innerHTML = 'Loading...';
  try {
    allItems = await api('GET', '/items/' + id);
    renderItems(allItems);
  } catch (err) { document.getElementById('list-group').innerHTML = 'Error loading data.'; }
}

function renderItems(items) {
  const group = document.getElementById('list-group'); group.innerHTML = '';
  const isAdmin = currentUser.role === 'admin';
  const mod = MODULES.find(m => m.id === currentMod);
  if (items.length === 0) return group.innerHTML = `<div style="text-align:center;padding:40px;color:gray;">No items found.</div>`;
  
  items.forEach(item => {
    const el = document.createElement('div'); el.className = 'list-item' + (isAdmin ? '' : ' clickable');
    
    // 如果是管理员，显示编辑/删除按钮；如果是普通用户，显示箭头
    const rightSide = isAdmin 
      ? `<div class="item-actions"><button class="btn-icon" onclick="openEditModal('${item._id}')">✎</button><button class="btn-icon" onclick="deleteItem('${item._id}')">✕</button></div>`
      : `<span style="color:var(--text-muted); font-size: 18px;">›</span>`;
    
    el.innerHTML = `<div class="list-icon">${item.icon||'📌'}</div><div class="list-info"><div class="list-name">${item.name}</div><div class="list-meta">${item.meta||''}</div></div>${rightSide}`;
    
    // 普通用户点击卡片，会跳出详情与下载弹窗
    if (!isAdmin) {
      el.onclick = () => openViewModal(item, mod.ctaLabel);
    }
    group.appendChild(el);
  });
}

// ---- 普通用户的专属查看弹窗 ----
function openViewModal(item, ctaLabel) {
  document.getElementById('vm-icon').textContent  = item.icon || '📌';
  document.getElementById('vm-title').textContent = item.name;
  document.getElementById('vm-meta').textContent  = item.meta  || '';
  
  // 如果后台填了 URL，就在描述里暗示一下
  document.getElementById('vm-desc').textContent  = "Click the button below to access the link.";
  
  const cta = document.getElementById('vm-cta');
  cta.textContent = ctaLabel;
  cta.onclick = () => {
    if (item.url) {
      // 核心功能：如果有链接，点击后在新标签页打开！
      window.open(item.url, '_blank'); 
    } else {
      alert("⚠️ Admin has not provided a link for this item yet.");
    }
    closeOverlay('view-overlay');
  };
  openOverlay('view-overlay');
}

function openAddModal() { 
  editingId = null; 
  document.getElementById('edit-modal-title').textContent = 'Add Item'; 
  document.getElementById('ef-icon').value = ''; 
  document.getElementById('ef-name').value = ''; 
  document.getElementById('ef-meta').value = ''; 
  document.getElementById('ef-url').value = ''; 
  openOverlay('edit-overlay'); 
}

function openEditModal(id) {
  const item = allItems.find(i => i._id === id); if (!item) return; editingId = id;
  document.getElementById('edit-modal-title').textContent = 'Edit Item';
  document.getElementById('ef-icon').value = item.icon || ''; 
  document.getElementById('ef-name').value = item.name || ''; 
  document.getElementById('ef-meta').value = item.meta || '';
  document.getElementById('ef-url').value = item.url || '';
  openOverlay('edit-overlay');
}

async function saveItem() {
  const icon = document.getElementById('ef-icon').value.trim() || '📌';
  const name = document.getElementById('ef-name').value.trim();
  const meta = document.getElementById('ef-meta').value.trim();
  const url  = document.getElementById('ef-url').value.trim(); // 获取网址输入框的值
  
  if (!name) return alert('Name required');
  try {
    if (editingId) {
      const updated = await api('PATCH', '/items/' + editingId, { icon, name, meta, url });
      allItems[allItems.findIndex(i => i._id === editingId)] = updated;
    } else {
      const created = await api('POST', '/items', { moduleId: currentMod, icon, name, meta, url });
      allItems.push(created);
    }
    closeOverlay('edit-overlay'); renderItems(allItems);
  } catch (err) { alert(err.message); }
}

async function deleteItem(id) {
  if (!confirm('Are you sure you want to delete this?')) return;
  try { await api('DELETE', '/items/' + id); allItems = allItems.filter(i => i._id !== id); renderItems(allItems); } 
  catch (err) { alert(err.message); }
}

function goBack() { showPage('dashboard-page'); buildDashboard(); }
function logout() { sessionStorage.removeItem('nexus_user'); showPage('login-page'); }
function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
function openOverlay(id) { document.getElementById(id).classList.add('show'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }

if (sessionStorage.getItem('nexus_user')) { currentUser = JSON.parse(sessionStorage.getItem('nexus_user')); enterApp(); }
</script>
</body>
</html>
