<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0e1119;--surface2:#151a26;--surface3:#1c2233;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.13);
  --accent:#6c9fff;--accent-glow:rgba(108,159,255,0.35);
  --green:#34d399;--red:#fc8181;--amber:#fbbf24;--purple:#b197fc;--pink:#f9a8d4;
  --text-primary:#e4e8f5;--text-secondary:#5c6480;--text-muted:#2c3248;
  --radius:10px;--mod-0:#6c9fff;--mod-1:#34d399;--mod-2:#b197fc;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-primary);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.page{display:flex;min-height:100vh;position:relative;z-index:1;}
.hidden{display:none!important;}
 
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(108,159,255,0.07),transparent 70%);top:-200px;right:-150px;animation:od1 22s ease-in-out infinite;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(177,151,252,0.06),transparent 70%);bottom:-150px;left:-100px;animation:od2 28s ease-in-out infinite;}
@keyframes od1{0%,100%{transform:translate(0,0)}50%{transform:translate(-55px,40px)}}
@keyframes od2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-50px)}}
 
.topbar{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(7,9,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;justify-content:space-between;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:10px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 18px rgba(108,159,255,0.4);animation:logo-pulse 3s ease-in-out infinite;}
@keyframes logo-pulse{0%,100%{box-shadow:0 0 18px rgba(108,159,255,0.35)}50%{box-shadow:0 0 30px rgba(108,159,255,0.6)}}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);}
.role-badge{padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;}
.role-badge.admin{background:rgba(251,191,36,0.12);color:var(--amber);border:1px solid rgba(251,191,36,0.2);}
.role-badge.user{background:rgba(108,159,255,0.1);color:#8ab4ff;border:1px solid rgba(108,159,255,0.18);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-secondary);font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;padding:5px 14px;border-radius:var(--radius);cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text-primary);background:var(--surface2);}
 
/* ══ LOGIN PAGE ══ */
#login-page{align-items:center;justify-content:center;flex-direction:column;min-height:100vh;}
.login-wrap{width:100%;max-width:420px;padding:0 20px 24px;position:relative;z-index:2;animation:wrap-in 0.7s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes wrap-in{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
 
/* ═══════════════════════════════════
   ASTRONAUT SCENE
═══════════════════════════════════ */
.scene{
  position:relative;
  width:280px;height:230px;
  margin:0 auto 2px;
  cursor:pointer;
  user-select:none;
}
 
/* floating planet (reference image: Saturn-like, orange/yellow) */
.planet{
  position:absolute;
  right:0px;bottom:30px;
  width:62px;height:62px;border-radius:50%;
  background:radial-gradient(circle at 36% 32%,#fde68a,#f59e0b 55%,#b45309);
  border:4px solid #1a1228;
  box-shadow:0 0 20px rgba(245,158,11,0.45);
  animation:planet-bob 4.5s ease-in-out infinite;
  overflow:visible;
}
/* planet ring */
.planet::before{
  content:'';position:absolute;
  top:20px;left:-18px;
  width:98px;height:22px;
  border-radius:50%;
  border:4px solid #1a1228;
  background:linear-gradient(180deg,rgba(253,230,138,0.45) 0%,rgba(245,158,11,0.25) 100%);
  transform:rotate(-16deg);
}
/* inner ring stripe */
.planet::after{
  content:'';position:absolute;
  top:26px;left:-10px;
  width:82px;height:10px;
  border-radius:50%;
  background:rgba(251,191,36,0.3);
  transform:rotate(-16deg);
}
@keyframes planet-bob{
  0%,100%{transform:translateY(0)  rotate(0deg);}
  50%    {transform:translateY(-8px) rotate(3deg);}
}
 
/* tiny stars */
.s{position:absolute;color:white;font-size:10px;animation:stw var(--d,2s) ease-in-out infinite var(--dl,0s);opacity:0.8;}
@keyframes stw{0%,100%{opacity:0.8;transform:scale(1)}50%{opacity:0.1;transform:scale(0.4)}}
 
/* ground shadow */
.g-shadow{
  position:absolute;bottom:6px;left:50%;
  transform:translateX(-50%);
  width:72px;height:14px;border-radius:50%;
  background:rgba(100,80,200,0.35);
  filter:blur(5px);
  animation:shad-pulse 3.8s ease-in-out infinite;
}
@keyframes shad-pulse{0%,100%{transform:translateX(-50%) scaleX(1);opacity:0.8}50%{transform:translateX(-50%) scaleX(0.65);opacity:0.35}}
 
/* speech bubble */
.bubble{
  position:absolute;top:4px;right:60px;
  background:white;border:3.5px solid #1a1228;
  border-radius:20px;
  padding:7px 11px;font-size:18px;line-height:1;
  opacity:0;transform:scale(0.4) translateY(8px);
  transition:opacity 0.22s,transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;z-index:10;
}
/* bubble tail pointing down-left */
.bubble::after{
  content:'';position:absolute;
  bottom:-15px;left:16px;
  border:8px solid transparent;
  border-top-color:white;
  filter:drop-shadow(0 3px 0 #1a1228);
}
.bubble::before{
  content:'';position:absolute;
  bottom:-20px;left:14px;
  border:10px solid transparent;
  border-top-color:#1a1228;
}
.bubble.show{opacity:1;transform:scale(1) translateY(0);}
 
/* ── Main astronaut SVG container ── */
.astro{
  position:absolute;
  bottom:18px;left:50%;
  transform:translateX(-52%);
  width:148px;
  /* idle float */
  animation:idle 3.8s ease-in-out infinite;
  filter:drop-shadow(0 10px 22px rgba(100,80,220,0.28));
  transform-origin:bottom center;
}
@keyframes idle{
  0%,100%{transform:translateX(-52%) translateY(0)    rotate(0deg);}
  28%    {transform:translateX(-52%) translateY(-11px) rotate(-2.5deg);}
  65%    {transform:translateX(-52%) translateY(-7px)  rotate(2deg);}
}
 
/* ─ State overrides ─ */
 
/* HAPPY: big jump, both arms fly up */
.s-happy .astro{animation:jump 0.7s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes jump{
  0%  {transform:translateX(-52%) translateY(0)     scale(1)    rotate(0);}
  22% {transform:translateX(-52%) translateY(-30px) scale(1.07) rotate(-7deg);}
  50% {transform:translateX(-52%) translateY(-20px) scale(1.04) rotate(6deg);}
  75% {transform:translateX(-52%) translateY(-26px) scale(1.05) rotate(-3deg);}
  100%{transform:translateX(-52%) translateY(0)     scale(1)    rotate(0);}
}
.s-happy .g-shadow{transform:translateX(-50%) scaleX(0.55)!important;opacity:0.25!important;}
.s-happy .planet{animation:planet-happy 0.6s ease-in-out 3;}
@keyframes planet-happy{0%,100%{transform:scale(1)}50%{transform:scale(1.12) rotate(8deg)}}
 
/* SAD: sag down, drooped body */
.s-sad .astro{animation:sag 0.55s ease both;}
@keyframes sag{
  0%  {transform:translateX(-52%) translateY(0)   rotate(0);}
  18% {transform:translateX(-56%) translateY(2px) rotate(-5deg);}
  36% {transform:translateX(-48%) translateY(2px) rotate(4deg);}
  55% {transform:translateX(-53%) translateY(4px) rotate(-2deg);}
  100%{transform:translateX(-52%) translateY(6px) rotate(-3deg);}
}
.s-sad .g-shadow{transform:translateX(-50%) scaleX(1.1)!important;opacity:0.9!important;}
.s-sad .planet{filter:grayscale(0.7) brightness(0.65);}
 
/* THINKING: slow tilt, arm-scratch pose */
.s-thinking .astro{animation:think 2.8s ease-in-out infinite;}
@keyframes think{
  0%,100%{transform:translateX(-52%) translateY(0)   rotate(-1.5deg);}
  50%    {transform:translateX(-52%) translateY(-5px) rotate(1.5deg);}
}
 
/* WOW (click): spin-bounce */
.s-wow .astro{animation:wow-spin 0.55s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes wow-spin{
  0%  {transform:translateX(-52%) translateY(0)     scale(1)    rotate(0);}
  30% {transform:translateX(-52%) translateY(-24px) scale(1.1)  rotate(20deg);}
  60% {transform:translateX(-52%) translateY(-14px) scale(1.06) rotate(-12deg);}
  100%{transform:translateX(-52%) translateY(0)     scale(1)    rotate(0);}
}
 
/* Confetti */
.confetti{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.cp{position:absolute;border-radius:50%;opacity:0;}
.s-happy .cp,.s-wow .cp{animation:cpb 0.85s ease-out both;}
.cp:nth-child(1){width:9px;height:9px;background:var(--accent); top:16%;left:3%;  animation-delay:0s;   --tx:-34px;--ty:-36px;}
.cp:nth-child(2){width:8px;height:8px;background:var(--pink);   top:5%; right:5%; animation-delay:0.04s;--tx:36px; --ty:-30px;}
.cp:nth-child(3){width:7px;height:7px;background:var(--green);  top:44%;left:0%;  animation-delay:0.08s;--tx:-38px;--ty:-4px;}
.cp:nth-child(4){width:7px;height:7px;background:var(--purple); top:44%;right:0%; animation-delay:0.06s;--tx:38px; --ty:-6px;}
.cp:nth-child(5){width:6px;height:6px;background:var(--amber);  bottom:18%;left:4%;animation-delay:0.02s;--tx:-24px;--ty:28px;}
.cp:nth-child(6){width:6px;height:6px;background:#fff;          bottom:12%;right:3%;animation-delay:0.1s;--tx:26px; --ty:22px;}
.cp:nth-child(7){width:5px;height:5px;background:var(--pink);   top:22%;left:14%; animation-delay:0.05s;--tx:-18px;--ty:-42px;}
.cp:nth-child(8){width:5px;height:5px;background:var(--accent); top:22%;right:12%;animation-delay:0.09s;--tx:20px; --ty:-40px;}
@keyframes cpb{
  0%  {opacity:0;transform:translate(0,0)scale(0);}
  42% {opacity:1;transform:translate(calc(var(--tx)*.5),calc(var(--ty)*.5))scale(1.8);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty))scale(0.2);}
}
 
/* SVG limb pivot groups — all transitions via CSS */
/* Each group has a transform-origin set in SVG or via JS */
#arm-l{transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1);transform-origin:56px 108px;}
#arm-r{transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1);transform-origin:92px 108px;}
#leg-l{transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1);transform-origin:60px 166px;}
#leg-r{transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1);transform-origin:88px 166px;}
 
/* ── limb positions per state ── */
 
/* default idle: slight natural pose */
#arm-l{transform:rotate(12deg);}
#arm-r{transform:rotate(-12deg);}
#leg-l{transform:rotate(8deg);}
#leg-r{transform:rotate(-8deg);}
 
/* happy: arms fully up (like cheering) */
.s-happy #arm-l,.s-wow #arm-l{transform:rotate(-130deg) translateY(-4px);}
.s-happy #arm-r,.s-wow #arm-r{transform:rotate(130deg) translateY(-4px);}
.s-happy #leg-l{transform:rotate(-20deg);}
.s-happy #leg-r{transform:rotate(20deg);}
 
/* sad: arms drooped way down, legs together */
.s-sad #arm-l{transform:rotate(55deg);}
.s-sad #arm-r{transform:rotate(-55deg);}
.s-sad #leg-l{transform:rotate(5deg);}
.s-sad #leg-r{transform:rotate(-5deg);}
 
/* thinking: one arm up to helmet (scratch head), lean */
.s-thinking #arm-l{transform:rotate(12deg);}
.s-thinking #arm-r{transform:rotate(-90deg) translateX(4px);}
.s-thinking #leg-l{transform:rotate(15deg);}
.s-thinking #leg-r{transform:rotate(-5deg);}
 
 
/* ══ LOGIN CARD ══ */
.login-title-row{text-align:center;margin-bottom:16px;}
.login-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;letter-spacing:0.04em;background:linear-gradient(135deg,#e4e8f5 20%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);margin-top:4px;letter-spacing:0.06em;}
.login-card{background:rgba(14,17,25,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:26px 28px;box-shadow:0 32px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.06);backdrop-filter:blur(18px);}
.login-tabs{display:flex;margin-bottom:22px;background:var(--surface2);border-radius:var(--radius);padding:3px;gap:3px;}
.login-tab{flex:1;padding:8px;background:transparent;border:none;color:var(--text-secondary);font-size:13px;font-weight:700;cursor:pointer;border-radius:7px;font-family:'Nunito',sans-serif;transition:all 0.2s;}
.login-tab.active{background:var(--surface3);color:var(--text-primary);box-shadow:0 2px 8px rgba(0,0,0,0.35);}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:tab-slide 0.25s ease both;}
@keyframes tab-slide{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);padding:10px 14px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;transition:all 0.2s;}
.field input:focus{border-color:rgba(108,159,255,0.5);box-shadow:0 0 0 3px rgba(108,159,255,0.09);background:var(--surface3);}
.field input::placeholder{color:var(--text-muted);}
.btn-primary{width:100%;padding:11px 16px;background:linear-gradient(135deg,var(--accent),#92b8ff);border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);opacity:0;transition:opacity 0.2s;}
.btn-primary:hover::before{opacity:1;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 26px var(--accent-glow);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.api-error{display:none;background:rgba(252,129,129,0.08);border:1px solid rgba(252,129,129,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;}
.api-error.show{display:block;animation:err-in 0.3s ease;}
@keyframes err-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
 
/* ══ DASHBOARD ══ */
#dashboard-page,#detail-page{flex-direction:column;padding-top:54px;}
.dash-content{max-width:1020px;margin:0 auto;padding:52px 28px 80px;width:100%;position:relative;z-index:2;}
.dash-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.dash-title{font-family:'Nunito',sans-serif;font-size:34px;font-weight:900;margin-bottom:8px;letter-spacing:-0.01em;}
.dash-title span{background:linear-gradient(135deg,#e4e8f5 30%,rgba(108,159,255,0.9));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dash-desc{font-size:14px;color:var(--text-secondary);margin-bottom:42px;}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;animation:card-up 0.5s cubic-bezier(0.16,1,0.3,1) both;}
.module-card:nth-child(1){animation-delay:0.05s;--mc:var(--mod-0)}
.module-card:nth-child(2){animation-delay:0.1s;--mc:var(--mod-1)}
.module-card:nth-child(3){animation-delay:0.15s;--mc:var(--mod-2)}
@keyframes card-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--mc),transparent);opacity:0;transition:opacity 0.3s;}
.module-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 0%,color-mix(in srgb,var(--mc) 8%,transparent),transparent 60%);opacity:0;transition:opacity 0.4s;pointer-events:none;}
.module-card:hover{border-color:rgba(255,255,255,0.11);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.module-card:hover::before,.module-card:hover::after{opacity:1;}
.card-icon-wrap{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:19px;background:color-mix(in srgb,var(--mc) 13%,transparent);border:1px solid color-mix(in srgb,var(--mc) 28%,transparent);color:var(--mc);transition:all 0.3s;}
.module-card:hover .card-icon-wrap{transform:scale(1.06);box-shadow:0 4px 18px color-mix(in srgb,var(--mc) 22%,transparent);}
.card-name{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;margin-bottom:7px;}
.card-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.card-arrow{display:inline-flex;align-items:center;margin-top:18px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--mc);opacity:0;transform:translateX(-6px);transition:all 0.3s;}
.module-card:hover .card-arrow{opacity:1;transform:translateX(0);}
.detail-content{max-width:820px;margin:0 auto;padding:48px 28px 80px;width:100%;position:relative;z-index:2;}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;}
.detail-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.detail-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;letter-spacing:-0.01em;}
.detail-sub{font-size:13px;color:var(--text-secondary);margin-top:4px;}
.btn-add{padding:9px 18px;background:linear-gradient(135deg,var(--accent),#92b8ff);border:none;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 18px var(--accent-glow);}
.list-group{display:flex;flex-direction:column;gap:8px;}
.list-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;animation:item-in 0.35s cubic-bezier(0.16,1,0.3,1) both;}
.list-item:nth-child(1){animation-delay:0.03s}.list-item:nth-child(2){animation-delay:0.06s}.list-item:nth-child(3){animation-delay:0.09s}.list-item:nth-child(4){animation-delay:0.12s}.list-item:nth-child(5){animation-delay:0.15s}
@keyframes item-in{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.list-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1);border-radius:0 2px 2px 0;}
.list-item:hover{border-color:var(--border-hover);background:var(--surface2);transform:translateX(4px);}
.list-item:hover::before{transform:scaleY(1);}
.list-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.25s;}
.list-item:hover .list-icon{transform:scale(1.05);border-color:var(--border-hover);}
.list-info{flex:1;min-width:0;}
.list-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.list-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);}
.item-actions{display:flex;gap:6px;}
.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.btn-icon:hover{color:var(--text-primary);border-color:var(--border-hover);background:var(--surface3);transform:scale(1.05);}
.btn-icon.danger:hover{color:var(--red);border-color:rgba(252,129,129,0.3);background:rgba(252,129,129,0.08);}
.skeleton-item{padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:14px;}
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.sk-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;}.sk-lines{flex:1;display:flex;flex-direction:column;gap:8px;}
.sk-line-a{height:13px;width:55%;}.sk-line-b{height:10px;width:30%;}
.overlay{display:none;position:fixed;inset:0;background:rgba(4,5,10,0.82);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.overlay.show .modal{animation:modal-pop 0.35s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes modal-pop{from{opacity:0;transform:scale(0.9) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal{background:var(--surface);border:1px solid var(--border-hover);border-radius:16px;width:100%;max-width:460px;padding:30px;box-shadow:0 40px 100px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);}
.modal-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px;}
.modal-divider{height:1px;background:var(--border);margin-bottom:20px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:7px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;}
.form-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);padding:9px 13px;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;transition:all 0.2s;}
.form-field input:focus{border-color:rgba(108,159,255,0.4);box-shadow:0 0 0 3px rgba(108,159,255,0.07);background:var(--surface3);}
.modal-actions{display:flex;gap:8px;margin-top:22px;}
.btn-modal-primary{flex:1;padding:10px 16px;background:linear-gradient(135deg,var(--accent),#92b8ff);border:none;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;}
.btn-modal-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px var(--accent-glow);}
.btn-modal-secondary{padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;transition:all 0.2s;}
.btn-modal-secondary:hover{background:var(--surface3);color:var(--text-primary);border-color:var(--border-hover);}
.vm-icon-wrap{width:52px;height:52px;border-radius:14px;background:var(--surface2);border:1px solid var(--border-hover);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;}
#vm-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
#vm-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:18px;}
#vm-desc{font-size:13px;color:var(--text-secondary);line-height:1.65;padding:14px 16px;background:var(--surface2);border-radius:10px;margin-bottom:22px;border:1px solid var(--border);}
#confirm-overlay .modal{max-width:360px;}
.confirm-icon{font-size:32px;margin-bottom:12px;}
.confirm-title{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;margin-bottom:8px;}
.btn-danger{flex:1;padding:10px 16px;background:rgba(252,129,129,0.15);border:1px solid rgba(252,129,129,0.3);border-radius:var(--radius);color:var(--red);cursor:pointer;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;transition:all 0.2s;}
.btn-danger:hover{background:rgba(252,129,129,0.25);transform:translateY(-1px);}
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface2);border:1px solid var(--border-hover);border-radius:14px;padding:14px 18px;box-shadow:0 20px 50px rgba(0,0,0,0.5);transform:translateY(30px) scale(0.94);opacity:0;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);z-index:300;display:flex;gap:12px;align-items:center;min-width:240px;pointer-events:none;}
.toast.show{transform:translateY(0) scale(1);opacity:1;pointer-events:auto;}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.toast-dot.success{background:var(--green);box-shadow:0 0 8px var(--green);}
.toast-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);}
.toast-dot.info{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.toast-title{font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;}
.toast-msg{font-size:12px;color:var(--text-secondary);margin-top:2px;}

          <!-- boot -->

                fill="#2a2440"/>

<script>
/* ── Starfield ── */
(function(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  let W,H,S=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function init(){S=[];for(let i=0;i<210;i++)S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+0.2,op:Math.random()*0.7+0.1,sp:Math.random()*0.018+0.004,ph:Math.random()*Math.PI*2});}
  let t=0;
  function draw(){ctx.clearRect(0,0,W,H);t+=0.01;S.forEach(s=>{const p=s.op*(0.5+0.5*Math.sin(t*s.sp*40+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p})`;ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();
 
/* ── State machine ── */
const API_BASE='https://nexus-api-server-ref0.onrender.com/api';
const MODULES=[
  {id:'downloads',icon:'↓',name:'App Downloads',desc:'Client apps, tools and packages.',ctaLabel:'Download Now'},
  {id:'tutorials',icon:'▶',name:'Tutorials',desc:'Step-by-step guides and training.',ctaLabel:'Open Link'},
  {id:'docs',icon:'📄',name:'Documentation',desc:'Technical specs and architecture.',ctaLabel:'View Doc'},
];
let currentUser=null,currentMod=null,allItems=[],editingId=null,pendingDeleteId=null;
 
const scene=document.getElementById('scene');
const bubble=document.getElementById('bubble');
 
const STATES={
  null:   {sc:'',       bub:'',    bshow:false},
  happy:  {sc:'s-happy',bub:'🎉', bshow:true},
  sad:    {sc:'s-sad',  bub:'😢', bshow:true},
  thinking:{sc:'s-thinking',bub:'🤔',bshow:true},
  wow:    {sc:'s-wow',  bub:'✨', bshow:true},
};
 
function setState(name){
  const prev=scene.dataset.state;
  if(prev) scene.classList.remove('s-'+prev);
  scene.dataset.state=name||'';
  const cfg=STATES[name]||STATES[null];
  if(cfg.sc) scene.classList.add(cfg.sc);
  bubble.textContent=cfg.bub;
  cfg.bshow?bubble.classList.add('show'):bubble.classList.remove('show');
}
 
// Click boop
scene.addEventListener('click',()=>{
  setState('wow');
  setTimeout(()=>setState(null),2000);
});
 
// Password focus → thinking
['login-pass','reg-pass'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('focus',()=>setState('thinking'));
  el.addEventListener('blur', ()=>setState(null));
});
 
/* ── API ── */
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(currentUser?.email) opts.headers['X-User-Email']=currentUser.email;
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(API_BASE+path,opts);
  const data=await res.json().catch(()=>({}));
  if(!res.ok||data.success===false) throw new Error(data.message||'Server error');
  return data;
}
 
function switchTab(tab){
  document.querySelectorAll('.login-tab').forEach((el,i)=>
    el.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.querySelectorAll('.api-error').forEach(e=>e.classList.remove('show'));
  setState(null);
}
 
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  setState('thinking');
  try{
    const r=await api('POST','/login',{email,password:pass});
    currentUser={name:email.split('@')[0].toUpperCase(),email:r.user.email,role:r.user.role};
    sessionStorage.setItem('nexus_user',JSON.stringify(currentUser));
    document.getElementById('login-email').value='';
    document.getElementById('login-pass').value='';
    setState('happy');
    await new Promise(res=>setTimeout(res,980));
    enterApp();
  }catch(err){
    setState('sad');
    const errEl=document.getElementById('api-error-login');
    errEl.textContent=err.message;errEl.classList.add('show');
    btn.disabled=false;btn.innerHTML='🚀 Launch';
    setTimeout(()=>{setState(null);errEl.classList.remove('show');},4500);
  }
}
 
async function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const name=document.getElementById('reg-name').value;
  const btn=document.getElementById('register-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  setState('thinking');
  try{
    const r=await api('POST','/register',{email,password:pass});
    currentUser={name:name.toUpperCase(),email:r.user.email,role:r.user.role};
    sessionStorage.setItem('nexus_user',JSON.stringify(currentUser));
    ['reg-email','reg-pass','reg-name'].forEach(id=>document.getElementById(id).value='');
    setState('happy');
    await new Promise(res=>setTimeout(res,980));
    enterApp();
  }catch(err){
    setState('sad');
    const errEl=document.getElementById('api-error-register');
    errEl.textContent=err.message;errEl.classList.add('show');
    btn.disabled=false;btn.innerHTML='🛸 Join Crew';
    setTimeout(()=>{setState(null);errEl.classList.remove('show');},4500);
  }
}
 
function logout(){
  sessionStorage.removeItem('nexus_user');
  currentUser=null;
  ['login-email','login-pass','reg-email','reg-pass','reg-name'].forEach(id=>document.getElementById(id).value='');
  // Reset both buttons back to their original label & enabled state
  const lb=document.getElementById('login-btn');
  lb.disabled=false; lb.innerHTML='🚀 Launch';
  const rb=document.getElementById('register-btn');
  rb.disabled=false; rb.innerHTML='🛸 Join Crew';
  // Clear any error messages
  document.querySelectorAll('.api-error').forEach(e=>e.classList.remove('show'));
  setState(null);
  showPage('login-page');
}
 
function enterApp(){
  document.getElementById('nav-user').textContent=currentUser.email;
  document.getElementById('nav-role-badge').textContent=currentUser.role==='admin'?'⚡ ADMIN':'👤 OP';
  document.getElementById('nav-role-badge').className='role-badge '+currentUser.role;
  document.getElementById('dash-name').textContent=currentUser.name;
  buildDashboard();showPage('dashboard-page');
  showToast('success','Mission Control ready!',currentUser.email);
}
 
function buildDashboard(){
  const g=document.getElementById('modules-grid');g.innerHTML='';
  MODULES.forEach(mod=>{
    const c=document.createElement('div');c.className='module-card';
    c.innerHTML=`<div class="card-icon-wrap">${mod.icon}</div><div class="card-name">${mod.name}</div><div class="card-desc">${mod.desc}</div><div class="card-arrow">Enter module →</div>`;
    c.onclick=()=>openModule(mod.id);g.appendChild(c);
  });
}
 
function showSkeleton(){
  document.getElementById('list-group').innerHTML=[1,2,3].map(()=>`<div class="skeleton-item"><div class="sk sk-icon"></div><div class="sk-lines"><div class="sk sk-line-a"></div><div class="sk sk-line-b"></div></div></div>`).join('');
}
 
async function openModule(id){
  currentMod=id;const mod=MODULES.find(m=>m.id===id);
  document.getElementById('detail-eyebrow').textContent='// '+id.toUpperCase();
  document.getElementById('detail-title').textContent=mod.name;
  document.getElementById('detail-subtitle').textContent=mod.desc;
  const ab=document.getElementById('add-item-btn');
  currentUser.role==='admin'?ab.classList.remove('hidden'):ab.classList.add('hidden');
  showPage('detail-page');showSkeleton();
  try{allItems=await api('GET','/items/'+id);renderItems(allItems);}
  catch(e){document.getElementById('list-group').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-secondary)">Error loading data.</div>';}
}
 
function renderItems(items){
  const g=document.getElementById('list-group');g.innerHTML='';
  const isAdmin=currentUser.role==='admin';
  const mod=MODULES.find(m=>m.id===currentMod);
  if(!items.length){g.innerHTML=`<div style="text-align:center;padding:60px 40px;color:var(--text-secondary);font-size:14px">No items yet.</div>`;return;}
  items.forEach(item=>{
    const el=document.createElement('div');el.className='list-item';
    const right=isAdmin
      ?`<div class="item-actions"><button class="btn-icon" onclick="openEditModal('${item._id}')" title="Edit">✎</button><button class="btn-icon danger" onclick="promptDelete('${item._id}')" title="Delete">✕</button></div>`
      :`<span style="color:var(--text-muted);font-size:20px;margin-right:2px">›</span>`;
    el.innerHTML=`<div class="list-icon">${item.icon||'📌'}</div><div class="list-info"><div class="list-name">${item.name}</div><div class="list-meta">${item.meta||''}</div></div>${right}`;
    if(!isAdmin) el.onclick=()=>openViewModal(item,mod.ctaLabel);
    g.appendChild(el);
  });
}
 
function openViewModal(item,ctaLabel){
  document.getElementById('vm-icon').textContent=item.icon||'📌';
  document.getElementById('vm-title').textContent=item.name;
  document.getElementById('vm-meta').textContent=item.meta||'';
  document.getElementById('vm-desc').textContent='Click the button below to access the secure link.';
  const cta=document.getElementById('vm-cta');cta.textContent=ctaLabel;
  cta.onclick=()=>{if(item.url)window.open(item.url,'_blank');else showToast('info','No link yet','Admin has not added a link for this item.');closeOverlay('view-overlay');};
  openOverlay('view-overlay');
}
 
function promptDelete(id){
  pendingDeleteId=id;
  document.getElementById('confirm-delete-btn').onclick=()=>{closeOverlay('confirm-overlay');deleteItem(pendingDeleteId);};
  openOverlay('confirm-overlay');
}
 
function openAddModal(){
  editingId=null;document.getElementById('edit-modal-title').textContent='Add Item';
  ['ef-icon','ef-name','ef-meta','ef-url'].forEach(id=>document.getElementById(id).value='');
  openOverlay('edit-overlay');
}
 
function openEditModal(id){
  const item=allItems.find(i=>i._id===id);if(!item)return;editingId=id;
  document.getElementById('edit-modal-title').textContent='Edit Item';
  document.getElementById('ef-icon').value=item.icon||'';
  document.getElementById('ef-name').value=item.name||'';
  document.getElementById('ef-meta').value=item.meta||'';
  document.getElementById('ef-url').value=item.url||'';
  openOverlay('edit-overlay');
}
 
async function saveItem(){
  const icon=document.getElementById('ef-icon').value.trim()||'📌';
  const name=document.getElementById('ef-name').value.trim();
  const meta=document.getElementById('ef-meta').value.trim();
  const url=document.getElementById('ef-url').value.trim();
  if(!name)return showToast('error','Validation','Name is required.');
  try{
    if(editingId){
      const u=await api('PATCH','/items/'+editingId,{icon,name,meta,url});
      allItems[allItems.findIndex(i=>i._id===editingId)]=u;
      showToast('success','Updated',`"${name}" saved.`);
    }else{
      const c=await api('POST','/items',{moduleId:currentMod,icon,name,meta,url});
      allItems.push(c);showToast('success','Created',`"${name}" added.`);
    }
    closeOverlay('edit-overlay');renderItems(allItems);
  }catch(e){showToast('error','Blocked',e.message);}
}
 
async function deleteItem(id){
  const item=allItems.find(i=>i._id===id);
  try{
    await api('DELETE','/items/'+id);
    allItems=allItems.filter(i=>i._id!==id);renderItems(allItems);
    showToast('success','Deleted',`"${item?.name||'Item'}" removed.`);
  }catch(e){showToast('error','Blocked',e.message);}
}
 
function goBack(){showPage('dashboard-page');buildDashboard();}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function openOverlay(id){document.getElementById(id).classList.add('show');}
function closeOverlay(id){document.getElementById(id).classList.remove('show');}
 
let toastTimer=null;
function showToast(type,title,msg){
  const el=document.getElementById('toast'),dot=document.getElementById('toast-dot');
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-msg').textContent=msg;
  dot.className='toast-dot '+(type==='error'?'error':type==='info'?'info':'success');
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}
 
if(sessionStorage.getItem('nexus_user')){currentUser=JSON.parse(sessionStorage.getItem('nexus_user'));enterApp();}
</script>
</body>
</html>
